function getSentiment(d,n){
  const eff=ND[d][(n-1)%30][1];
  const bad=['ဆုံးရှုံ','ဆိုးကျိုး','ကြောက်','ဒုက္ခ','မကောင်','ဝမ်းနည်','နာမကျန်','ဒဏ်ရာ','ဆင်းရဲ','ရှောင်','ပူပင်'];
  const good=['အောင်မြင်','ရရှိမည်','တိုးပွားမည်','မင်္ဂလာ','ကောင်းသော','ဝင်ငွေ','ချမ်းသာ','ဝမ်းမြောက်','ပပျောက်'];
  if(bad.some(w=>eff.includes(w)))return['ဆင်ခြင်ပါ','badge-bad'];
  if(good.some(w=>eff.includes(w)))return['မင်္ဂလာ','badge-good'];
  return['သာမန်','badge-neutral'];
}

function timeToMin(s){const p=s.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function minToTime(m){const h=Math.floor(m/60)%24,mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');}

async function getSunriseAI(loc,date){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:50,messages:[{role:'user',content:'Sunrise time for '+loc+' on '+date+'. Reply ONLY with HH:MM 24-hour format.'}]})});
    const d=await r.json();
    const t=d.content[0].text.trim().slice(0,5);
    if(/^\d{2}:\d{2}$/.test(t))return t;
  }catch(e){}
  return'06:00';
}

async function calcNow(){
  const loc=document.getElementById('loc-now').value||'Yangon, Myanmar';
  const btn=document.getElementById('btn-now');
  btn.textContent='တွက်ချက်နေသည်...';btn.disabled=true;
  const now=new Date();
  const ds=now.toISOString().slice(0,10);
  const sr=await getSunriseAI(loc,ds);
  btn.textContent='လက်ရှိ နာဒီကာ ကြည့်ရန်';btn.disabled=false;
  const nowMin=now.getHours()*60+now.getMinutes();
  const srMin=timeToMin(sr);
  const dow=now.getDay();
  const diff=nowMin-srMin;
  if(diff<0){alert('နေမထွက်သေးပါ — တွက်မရသေးပါ');return;}
  const n=Math.min(Math.floor(diff/24)+1,60);
  document.getElementById('now-nadika').textContent=n+'/'+(((n-1)%30)+1);
  document.getElementById('now-day').textContent=PLANETS[dow];
  document.getElementById('now-sunrise').textContent='နေထွက် '+sr+' ('+loc+')';
  document.getElementById('now-prog').style.width=Math.min(100,Math.round(diff/14.4))+'%';
  document.getElementById('now-elapsed').textContent='နေထွက်မှ '+Math.floor(diff/60)+' နာရီ '+diff%60+' မိနစ် ကြာပြီ  |  '+DAYS[dow]+'နေ့';
  const [t,b]=ND[dow][(n-1)%30];
  document.getElementById('now-etitle').textContent=t;
  document.getElementById('now-ebody').textContent=b;
  const [sl,sc]=getSentiment(dow,n);
  const badge=document.getElementById('now-badge');
  badge.textContent=sl;badge.className='badge '+sc;
  document.getElementById('now-result').style.display='block';
}

  if(diff<0){alert('နေထွက်ချိန်မတိုင်မီ ဖြစ်နေသည်');return;}

  const [t,b]=ND[dow][(n-1)%30];
  document.getElementById('calc-etitle').textContent=t;
  document.getElementById('calc-ebody').textContent=b;
  const [sl,sc]=getSentiment(dow,n);
  const badge=document.getElementById('calc-badge');
  badge.textContent=sl;badge.className='badge '+sc;
  document.getElementById('calc-result').style.display='block';
}

function buildSched(){
  const ds=document.getElementById('sched-date').value;
  const sr=document.getElementById('sched-sr').value||'06:00';
  if(!ds){alert('ရက်စွဲ ထည့်ပါ');return;}
  const dow=new Date(ds).getDay();
  const srMin=timeToMin(sr);
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const isToday=ds===new Date().toISOString().slice(0,10);
  let html='<div class="label" style="margin-bottom:10px">'+DAYS[dow]+'နေ့ ('+ds+') — နာဒီကာ အချိန်ဇယား</div>';
  for(let i=1;i<=30;i++){
    const startMin=srMin+(i-1)*24;
    if(startMin-srMin>=1440)break;
    const endMin=startMin+24;
    const [t,b]=ND[dow][(i-1)%30];
    const [sl,sc]=getSentiment(dow,i);
    const isCur=isToday&&nowMin>=startMin&&nowMin<endMin;
    const dot=sc==='badge-good'?'#1D9E75':sc==='badge-bad'?'#E24B4A':'#888780';
    html+=`<div class="nadika-row${isCur?' current':''}">
      <span class="num">${i}/${i}</span>
      <span class="dot" style="background:${dot}"></span>
      <span class="eff-wrap">
        <div class="eff-title">${t}</div>
        <div class="eff-desc">${b.slice(0,80)}${b.length>80?'...':''}</div>
      </span>
      <span class="time">${minToTime(startMin)}</span>
    </div>`;
  }
  document.getElementById('sched-result').innerHTML=html;
}

function showTab(t,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('show');
  el.classList.add('active');
}

const today=new Date().toISOString().slice(0,10);
document.getElementById('calc-date').value=today;
document.getElementById('sched-date').value=today;
</script>
