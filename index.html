<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadika Pro - Ultimate 420</title>
    <style>
        :root { --gold: #d4af37; --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pyidaungsu', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; }
        .setup-card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        label { font-size: 11px; color: var(--gold); display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn-calc { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; font-size: 16px; }
        .now-card { background: var(--gold); color: black; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; display: none; }
        .sun-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }
        .list-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; display: none; }
        .list-item { display: grid; grid-template-columns: 90px 1fr; padding: 15px 12px; border-bottom: 1px solid #222; align-items: center; }
        .list-item.active { background: rgba(212, 175, 55, 0.25); border-left: 5px solid var(--gold); }
        .time-txt { font-weight: bold; font-size: 13px; color: #fff; }
        .n-title { font-weight: bold; color: var(--gold); font-size: 16px; }
        .n-desc { font-size: 12px; color: #aaa; }
    </style>
</head>
<body onload="init()">

<div style="max-width: 500px; margin: 0 auto;">
    <div class="setup-card">
        <label>📍 မြို့အမည် (ဥပမာ - Tokyo, Yangon)</label>
        <input type="text" id="cityInput" value="Yangon">
        <label>📅 ရက်စွဲရွေးချယ်ပါ</label>
        <input type="date" id="targetDate">
        <button class="btn-calc" onclick="calculateAll()">တွက်ချက်မည်</button>
    </div>

    <div id="resultArea">
        <div class="now-card" id="nowCard">
            <div id="locDisplay" style="font-weight: bold;">--</div>
            <div id="clock" style="font-size: 26px; font-weight: bold; margin: 5px 0;">--:--:--</div>
            <div class="sun-info">
                <div>☀️ နေထွက်: <span id="sunriseTxt">06:00 AM</span></div>
                <div>🌙 နေဝင်: <span id="sunsetTxt">06:00 PM</span></div>
            </div>
            <div id="nowNadika" style="font-size: 22px; font-weight: bold; margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px;">နာဒီကာ --</div>
            <div id="nowTitle" style="font-weight: bold;">--</div>
        </div>
        <div class="list-container" id="listContainer"><div id="listBody"></div></div>
    </div>
</div>

<script>
    // ၇ ရက်စာ ၄၂၀ ဟောကိန်း Database
    const dayNames = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
    const baseEffects = [
        ["အစပျိုးခြင်း", "အလုပ်သစ်စတင်ရန် ကောင်းသည်။"], ["လာဘ်လာဘ", "ငွေဝင်ကိန်းရှိသည်။"], ["အဟန့်အတား", "စကားပြော ဆင်ခြင်ပါ။"],
        ["အောင်မြင်မှု", "ကြိုးစားသမျှ အရာထင်မည်။"], ["မိတ်ဆွေ", "အကူအညီ ရရှိမည်။"], ["ပျော်ရွှင်မှု", "စိတ်ချမ်းမြေ့စရာ ကြုံရမည်။"],
        ["သတိပြုရန်", "ကျန်းမာရေး ဂရုစိုက်ပါ။"], ["ခရီးသွား", "ခရီးသွားလာရန် ကောင်းသည်။"], ["ပညာရေး", "စာပေလေ့လာရန် ကောင်းသည်။"],
        ["အိမ်ထောင်ရေး", "နားလည်မှု ရရှိမည်။"], ["ရန်အောင်", "ရန်သူကို အောင်နိုင်မည်။"], ["ဥစ္စာပစ္စည်း", "အဖိုးတန်ပစ္စည်း ဝင်မည်။"],
        ["စီးပွားရေး", "လုပ်ငန်းတိုးချဲ့ရန် ကောင်းသည်။"], ["လူကြီးမင်း", "ချီးကျူးခံရမည်။"], ["ဆုံးရှုံးမှု", "ငွေကြေး သတိထားပါ။"],
        ["မင်္ဂလာရှိ", "ကုသိုလ်ပြုရန် ကောင်းသည်။"], ["ထူးခြားမှု", "သတင်းကောင်း ရမည်။"], ["အစိုးရ", "ဌာနဆိုင်ရာ အောင်မြင်မည်။"],
        ["နှောင့်နှေး", "အလုပ်တွင် ကြန့်ကြာနိုင်၏။"], ["ငြိမ်းချမ်း", "စိတ်အေးချမ်းမည့် အချိန်။"], ["ကံစမ်းခြင်း", "ထီပေါက်ကိန်း ရှိသည်။"],
        ["သတိထား", "ပစ္စည်းပျောက်တတ်သည်။"], ["အကူအညီ", "မိတ်ဆွေက ပံ့ပိုးမည်။"], ["အရောင်းအဝယ်", "အဆင်ပြေ ချောမွေ့မည်။"],
        ["ဆက်သွယ်ရေး", "သတင်းစကား ကောင်းရမည်။"], ["ဖန်တီးမှု", "အနုပညာ အောင်မြင်မည်။"], ["နေရာထိုင်ခင်း", "အိမ်ကိစ္စ အဆင်ပြေမည်။"],
        ["ဘာသာရေး", "တရားအားထုတ်ရန် ကောင်းသည်။"], ["အရှုံး", "ရင်းနှီးမြှုပ်နှံမှု သတိပြုပါ။"], ["ပြီးမြောက်", "အရာရာ အောင်မြင်မည်။"]
    ];

    const ND_FULL_DATA = {};
    dayNames.forEach((d, idx) => {
        ND_FULL_DATA[idx] = { 
            day: baseEffects.map(e => [`${daysMM(idx)} (နေ့) - ${e[0]}`, e[1]]),
            night: baseEffects.map(e => [`${daysMM(idx)} (ည) - ${e[0]}`, e[1]])
        };
    });

    function daysMM(idx) { return ["တနင်္ဂနွေ", "တနင်္လာ", "အင်္ဂါ", "ဗုဒ္ဓဟူး", "ကြာသပတေး", "သောကြာ", "စနေ"][idx]; }

    let sunriseMins = 360, sunsetMins = 1080, tZone = "Asia/Yangon";

    function init() {
        document.getElementById('targetDate').valueAsDate = new Date();
        setInterval(updateClock, 1000);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }

    async function calculateAll() {
        const city = document.getElementById('cityInput').value;
        const btn = document.querySelector('.btn-calc');
        btn.innerText = "တွက်ချက်နေသည်...";

        try {
            const res = await fetch(`https://wttr.in/${city}?format=j1`);
            const data = await res.json();
            const sun = data.weather[0].astronomy[0];
            document.getElementById('sunriseTxt').innerText = sun.sunrise;
            document.getElementById('sunsetTxt').innerText = sun.sunset;
            sunriseMins = toMins(sun.sunrise);
            sunsetMins = toMins(sun.sunset);
            tZone = data.nearest_area[0].timezone[0].value;
        } catch (e) {
            console.log("Using Default Sun Times");
        }

        document.getElementById('nowCard').style.display = "block";
        document.getElementById('listContainer').style.display = "block";
        btn.innerText = "တွက်ချက်မည်";
        updateDisplay();
    }

    function toMins(s) {
        let [t, p] = s.split(' ');
        let [h, m] = t.split(':').map(Number);
        if (p === "PM" && h < 12) h += 12;
        return h * 60 + m;
    }

    function updateDisplay() {
        const selDate = new Date(document.getElementById('targetDate').value);
        const dow = selDate.getDay();
        const now = new Date();
        const curMins = now.getHours() * 60 + now.getMinutes();

        let isDay = curMins >= sunriseMins && curMins < sunsetMins;
        let startM = isDay ? sunriseMins : sunsetMins;
        let diff = curMins - startM;
        if (diff < 0 && !isDay) diff = (1440 - sunsetMins) + curMins;
        
        let activeN = Math.floor(diff / 24) + 1;
        if (activeN > 30) activeN = 30;

        document.getElementById('locDisplay').innerText = `${document.getElementById('cityInput').value} | ${daysMM(dow)}နေ့`;
        
        let html = "";
        const dataSet = isDay ? ND_FULL_DATA[dow].day : ND_FULL_DATA[dow].night;

        for (let i = 1; i <= 30; i++) {
            const m = startM + (i - 1) * 24;
            const isActive = (i === activeN);
            const effect = dataSet[i-1];

            html += `<div class="list-item ${isActive ? 'active' : ''}">
                <div class="time-txt">${formatTime(m)}</div>
                <div><span class="n-title">${i}. ${effect[0]}</span><br><span class="n-desc">${effect[1]}</span></div>
            </div>`;
            
            if (isActive) {
                document.getElementById('nowNadika').innerText = (isDay ? "နေ့ " : "ည ") + "နာဒီကာ " + i;
                document.getElementById('nowTitle').innerText = effect[0];
            }
        }
        document.getElementById('listBody').innerHTML = html;
        setTimeout(() => document.querySelector('.active')?.scrollIntoView({behavior:'smooth', block:'center'}), 300);
    }

    function formatTime(mins) {
        let h = Math.floor(mins / 60) % 24;
        let m = mins % 60;
        return (h % 12 || 12) + ":" + (m < 10 ? '0' + m : m) + (h >= 12 ? ' PM' : ' AM');
    }
</script>
</body>
</html>
