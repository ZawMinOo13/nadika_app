<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadika Siddhanta - နာဒီကာဗေဒင်</title>
    <style>
        :root {
            --primary: #d4af37;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #b0b0b0;
            --border: #333;
            --accent: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header h1 { color: var(--primary); font-size: 22px; letter-spacing: 1px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #252525; border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; font-size: 16px; }
        
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #f1c40f; transform: scale(1.02); }

        .result-box { display: none; text-align: center; animation: fadeIn 0.6s ease-out; }
        .nadika-number { font-size: 56px; color: var(--primary); font-weight: bold; margin: 5px 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .effect-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #fff; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        .effect-desc { color: var(--text-dim); font-size: 15px; text-align: justify; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .footer { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px; }
        .highlight { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>နာဒီကာ သိဒ္ဓန္တ (NADIKA)</h1>
        <p style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">နာဒီကာဗေဒင် တွက်ချက်စက်</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>နေ့ရက် ရွေးချယ်ပါ</label>
            <select id="daySelect">
                <option value="0">တနင်္ဂနွေ (Sunday)</option>
                <option value="1">တနင်္လာ (Monday)</option>
                <option value="2">အင်္ဂါ (Tuesday)</option>
                <option value="3">ဗုဒ္ဓဟူး (Wednesday)</option>
                <option value="4">ကြာသပတေး (Thursday)</option>
                <option value="5">သောကြာ (Friday)</option>
                <option value="6">စနေ (Saturday)</option>
            </select>
        </div>
        <div class="input-group">
            <label>တွက်ချက်မည့် အချိန်</label>
            <input type="time" id="timeInput">
        </div>
        <div class="input-group">
            <label>နေထွက်ချိန် (ဒေသအလိုက်)</label>
            <input type="time" id="sunriseInput" value="06:00">
        </div>
        <button onclick="calculateNadika()">ဟောကိန်း ထုတ်ယူမည်</button>
    </div>

    <div id="resultBox" class="card result-box">
        <div class="label" id="currentInfo" style="font-size: 12px; color: var(--primary);"></div>
        <div id="nadikaDisplay" class="nadika-number">--</div>
        <div id="effectTitle" class="effect-title">ဟောကိန်းခေါင်းစဉ်</div>
        <div id="effectDesc" class="effect-desc">အသေးစိတ်ဖော်ပြချက်...</div>
    </div>

    <div class="footer">
        ဗေဒင်ပညာရပ်သည် လမ်းညွှန်မှုတစ်ခုသာဖြစ်ပါသည်။<br>
        © 2026 Myanmar Nadika App | Created for Personalization
    </div>
</div>

    // --- JavaScript Logic ---

    // လက်ရှိအချိန်ကို Default သတ်မှတ်ခြင်း
    function setDefaultTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('timeInput').value = `${hours}:${minutes}`;
        document.getElementById('daySelect').value = now.getDay();
    }

    setDefaultTime();

    function calculateNadika() {
        const day = parseInt(document.getElementById('daySelect').value);
        const timeVal = document.getElementById('timeInput').value;
        const sunriseVal = document.getElementById('sunriseInput').value;

        if(!timeVal || !sunriseVal) {
            alert("ကျေးဇူးပြု၍ အချိန်များကို မှန်ကန်စွာ ထည့်သွင်းပေးပါ။");
            return;
        }

        const [h, m] = timeVal.split(':').map(Number);
        const [sh, sm] = sunriseVal.split(':').map(Number);

        const currentMinutes = h * 60 + m;
        const sunriseMinutes = sh * 60 + sm;

        let diff = currentMinutes - sunriseMinutes;
        let activeDay = day;

        // နေမထွက်မီအချိန်ဖြစ်ပါက (Vedic အရ နေ့သစ်မကူးသေးပါ)
        if (diff < 0) {
            diff += 1440; // ၂၄ နာရီပေါင်းထည့်ခြင်း
            activeDay = (day === 0) ? 6 : day - 1; // မနေ့ကနေ့ကို ယူခြင်း
        }

        // နာဒီကာ နံပါတ်တွက်ခြင်း (၂၄ မိနစ်လျှင် ၁ နာဒီကာ)
        let nadikaNo = Math.floor(diff / 24) + 1;
        if (nadikaNo > 60) nadikaNo = 60;

        // UI Update လုပ်ခြင်း
        const dayNames = ["တနင်္ဂနွေ", "တနင်္လာ", "အင်္ဂါ", "ဗုဒ္ဓဟူး", "ကြာသပတေး", "သောကြာ", "စနေ"];
        document.getElementById('currentInfo').innerHTML = `<span class="highlight">${dayNames[activeDay]}နေ့</span> ၏ နာဒီကာကို တွက်ချက်ထားပါသည်။`;
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('nadikaDisplay').innerText = nadikaNo + "/60";

        // ဟောကိန်း Database မှ ရှာဖွေခြင်း (၁ မှ ၃၀ နှင့် ၃၁ မှ ၆၀ သည် အတူတူပင်ဖြစ်သည်)
        let lookupNo = nadikaNo;
        if (nadikaNo > 30) lookupNo = nadikaNo - 30;

        const effect = ND_DATA[activeDay] ? ND_DATA[activeDay][lookupNo] : null;

        if (effect) {
            document.getElementById('effectTitle').innerText = effect[0];
            document.getElementById('effectDesc').innerText = effect[1];
        } else {
            document.getElementById('effectTitle').innerText = "ယေဘုယျ ဟောကိန်း";
            document.getElementById('effectDesc').innerText = "ဤအချိန်သည် ပုံမှန်အတိုင်းပင် ဖြစ်ပါသည်။ အထွေထွေ ကောင်းကျိုးများ ရှိနိုင်ပါသည်။";
        }
        
        // ရလဒ်ဆီသို့ Scroll ဆွဲသွားရန်
        document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
    }
